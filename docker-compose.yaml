# Bento — Full-Stack Docker Compose
# Usage:
#   1. Copy .env.template to .env and fill in values (defaults work for local dev)
#   2. docker compose up -d              — start everything
#   3. docker compose up -d --build      — rebuild and start
#   4. docker compose logs -f auth-service  — tail a service's logs
#
# Frontend: http://localhost:3000
# API Gateway: http://localhost:8080
# Kafka UI: http://localhost:8989
# MinIO Console: http://localhost:9001
# MailHog UI: http://localhost:8025

services:

  # ── INFRASTRUCTURE ───────────────────────────────────────────────────

  # ── PostgreSQL (Auth) ────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "${POSTGRES_AUTH_PORT:-5433}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: authdb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── PostgreSQL (Org) ─────────────────────────────────────────────────────
  postgres-org:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "${POSTGRES_ORG_PORT:-5434}:5432"
    volumes:
      - postgres_org_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orgdb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── PostgreSQL (Board) ───────────────────────────────────────────────────
  postgres-board:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "${POSTGRES_BOARD_PORT:-5435}:5432"
    volumes:
      - postgres_board_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: boarddb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft) ───────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    restart: unless-stopped
    ports:
      - "29092:29092"
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NODE_ID: 1
      CLUSTER_ID: MQtR0h8MQcSFSjYjKykizQ
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://:9093
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 10

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:8.2.5
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: task_db
    healthcheck:
      test: echo 'db.runCommand({serverStatus:1}).ok' | mongosh admin -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet | grep 1
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── MinIO (S3-compatible storage) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://localhost:5173,http://*.localhost:3000"
    command: server /data --console-address ":9001"
    healthcheck:
      test: mc ready local
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # ── MailHog (dev email) ──────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

  # ── Kafka UI ─────────────────────────────────────────────────────────────
  kafkaui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8989}:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: bento-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit -1
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ── APPLICATION SERVICES ─────────────────────────────────────────────
  # ╚══════════════════════════════════════════════════════════════════════════╝

  # ── API Gateway ──────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Auth Service ─────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      AUTH_PEPPER: ${AUTH_PEPPER}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Org Service ──────────────────────────────────────────────────────────
  org-service:
    build:
      context: ./backend
      dockerfile: org-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres-org:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Board Service ────────────────────────────────────────────────────────
  board-service:
    build:
      context: ./backend
      dockerfile: board-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres-board:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Task Service ─────────────────────────────────────────────────────────
  task-service:
    build:
      context: ./backend
      dockerfile: task-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Notification Service ─────────────────────────────────────────────────
  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      DISCORD_ENABLED: ${DISCORD_ENABLED}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started

  # ── Realtime Service (WebSocket/STOMP) ───────────────────────────────────
  realtime-service:
    build:
      context: ./backend
      dockerfile: realtime-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Attachment Service ───────────────────────────────────────────────────
  attachment-service:
    build:
      context: ./backend
      dockerfile: attachment-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_DOMAIN: ${VITE_APP_DOMAIN}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api-gateway

volumes:
  postgres_auth_data:
  postgres_org_data:
  postgres_board_data:
  redis_data:
  kafka_data:
  mongo_data:
  minio_data: