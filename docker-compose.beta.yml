# Bento Beta — Docker Compose (Hub images)
# ─────────────────────────────────────────────────────────────────────────────
# This file runs Bento entirely from pre-built images on Docker Hub.
# No source code or build tools required.
#
# Quick start:
#   1. cp .env.example .env      — fill in your secrets
#   2. docker compose -f docker-compose.beta.yml up -d
#   3. Open http://localhost:3000
#
# Tag: v0.1.1-beta-2
# Platforms: linux/amd64, linux/arm64 (Raspberry Pi 4/5, Apple Silicon via Docker Desktop)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── INFRASTRUCTURE ───────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: authdb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d authdb
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  postgres-org:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres_org_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orgdb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d orgdb
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  postgres-board:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres_board_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: boarddb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d boarddb
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    restart: unless-stopped
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NODE_ID: 1
      CLUSTER_ID: MQtR0h8MQcSFSjYjKykizQ
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:29092 --list
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: task_db
    healthcheck:
      test: echo 'db.runCommand({serverStatus:1}).ok' | mongosh admin -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet | grep 1
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: mc ready local
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_UI_PORT:-8025}:8025"

  # ── APPLICATION SERVICES ─────────────────────────────────────────────────

  api-gateway:
    image: andreibel/bento-api-gateway:v0.1.1-beta-2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auth-service:
    image: andreibel/bento-auth-service:v0.1.1-beta-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      AUTH_PEPPER: ${AUTH_PEPPER}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  org-service:
    image: andreibel/bento-org-service:v0.1.1-beta-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres-org:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  board-service:
    image: andreibel/bento-board-service:v0.1.1-beta-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres-board:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  task-service:
    image: andreibel/bento-task-service:v0.1.1-beta-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    image: andreibel/bento-notification-service:v0.1.1-beta-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      DISCORD_ENABLED: ${DISCORD_ENABLED:-false}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started

  realtime-service:
    image: andreibel/bento-realtime-service:v0.1.1-beta-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  attachment-service:
    image: andreibel/bento-attachment-service:v0.1.1-beta-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: andreibel/bento-frontend:v0.1.1-beta-2
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api-gateway

volumes:
  postgres_auth_data:
  postgres_org_data:
  postgres_board_data:
  redis_data:
  kafka_data:
  mongo_data:
  minio_data:
