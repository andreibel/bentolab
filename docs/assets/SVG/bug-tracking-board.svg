<svg viewBox="0 0 510 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="510" height="350" fill="#FFF5F5" rx="8"/>

  <!-- header bar -->
  <rect x="20" y="16" width="470" height="34" rx="8" fill="white" stroke="#E4E4E7" stroke-width="1"/>
  <text x="32" y="38" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0F0F10">Bug Tracker</text>
  <rect x="350" y="22" width="64" height="22" rx="6" fill="#FEE2E2"/>
  <text x="382" y="37" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#EF4444" text-anchor="middle">12 open</text>
  <rect x="422" y="22" width="60" height="22" rx="6" fill="#D1FAE5"/>
  <text x="452" y="37" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">8 fixed</text>

  <!-- column headers -->
  <rect x="20" y="60" width="470" height="26" rx="6" fill="#F3F4F6"/>
  <text x="32"  y="77" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#71717A" letter-spacing="0.06em">ID</text>
  <text x="74"  y="77" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#71717A" letter-spacing="0.06em">TITLE</text>
  <text x="310" y="77" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#71717A" letter-spacing="0.06em">SEVERITY</text>
  <text x="408" y="77" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#71717A" letter-spacing="0.06em">STATUS</text>

  <!-- row 1 (even) -->
  <rect x="20" y="90" width="470" height="44" rx="6" fill="white" stroke="#F3F4F6" stroke-width="1"/>
  <text x="32" y="117" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#A1A1AA">BEN-01</text>
  <circle cx="68" cy="112" r="5" fill="#EF4444"/>
  <text x="80" y="116" font-family="system-ui,sans-serif" font-size="11" fill="#0F0F10">Login fails on mobile Safari</text>
  <rect x="310" y="103" width="56" height="18" rx="6" fill="#FEE2E2"/>
  <text x="338" y="116" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#EF4444" text-anchor="middle">CRITICAL</text>
  <rect x="406" y="103" width="74" height="18" rx="6" fill="#EEF0FF"/>
  <text x="443" y="116" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#5B47E0" text-anchor="middle">IN PROGRESS</text>

  <!-- row 2 (odd) -->
  <rect x="20" y="140" width="470" height="44" rx="6" fill="#FAFAFA" stroke="#F3F4F6" stroke-width="1"/>
  <text x="32" y="167" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#A1A1AA">BEN-02</text>
  <circle cx="68" cy="162" r="5" fill="#F97316"/>
  <text x="80" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#0F0F10">Dashboard chart renders blank</text>
  <rect x="310" y="153" width="56" height="18" rx="6" fill="#FFEDD5"/>
  <text x="338" y="166" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#F97316" text-anchor="middle">HIGH</text>
  <rect x="406" y="153" width="74" height="18" rx="6" fill="#F3F4F6"/>
  <text x="443" y="166" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#71717A" text-anchor="middle">NEW</text>

  <!-- row 3 (even) -->
  <rect x="20" y="190" width="470" height="44" rx="6" fill="white" stroke="#F3F4F6" stroke-width="1"/>
  <text x="32" y="217" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#A1A1AA">BEN-03</text>
  <circle cx="68" cy="212" r="5" fill="#F59E0B"/>
  <text x="80" y="216" font-family="system-ui,sans-serif" font-size="11" fill="#0F0F10">Export CSV missing last column</text>
  <rect x="310" y="203" width="56" height="18" rx="6" fill="#FEF3C7"/>
  <text x="338" y="216" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#F59E0B" text-anchor="middle">MEDIUM</text>
  <rect x="406" y="203" width="74" height="18" rx="6" fill="#DBEAFE"/>
  <text x="443" y="216" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#3B82F6" text-anchor="middle">IN REVIEW</text>

  <!-- row 4 (odd) -->
  <rect x="20" y="240" width="470" height="44" rx="6" fill="#FAFAFA" stroke="#F3F4F6" stroke-width="1"/>
  <text x="32" y="267" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#A1A1AA">BEN-04</text>
  <circle cx="68" cy="262" r="5" fill="#10B981"/>
  <text x="80" y="266" font-family="system-ui,sans-serif" font-size="11" fill="#0F0F10">Notification badge not clearing</text>
  <rect x="310" y="253" width="56" height="18" rx="6" fill="#D1FAE5"/>
  <text x="338" y="266" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#10B981" text-anchor="middle">LOW</text>
  <rect x="406" y="253" width="74" height="18" rx="6" fill="#D1FAE5"/>
  <text x="443" y="266" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#10B981" text-anchor="middle">RESOLVED</text>

  <!-- row 5 (even) -->
  <rect x="20" y="290" width="470" height="44" rx="6" fill="white" stroke="#F3F4F6" stroke-width="1"/>
  <text x="32" y="317" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#A1A1AA">BEN-05</text>
  <circle cx="68" cy="312" r="5" fill="#F97316"/>
  <text x="80" y="316" font-family="system-ui,sans-serif" font-size="11" fill="#0F0F10">File upload hangs over 10 MB</text>
  <rect x="310" y="303" width="56" height="18" rx="6" fill="#FFEDD5"/>
  <text x="338" y="316" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#F97316" text-anchor="middle">HIGH</text>
  <rect x="406" y="303" width="74" height="18" rx="6" fill="#F3F4F6"/>
  <text x="443" y="316" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#71717A" text-anchor="middle">NEW</text>
</svg>