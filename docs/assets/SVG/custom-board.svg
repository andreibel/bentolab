<svg viewBox="0 0 510 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="510" height="350" fill="#FAFAF9" rx="8"/>

  <!-- header -->
  <rect x="20" y="16" width="470" height="34" rx="8" fill="white" stroke="#E4E4E7" stroke-width="1"/>
  <text x="32" y="38" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0F0F10">Your Board</text>
  <rect x="420" y="22" width="62" height="22" rx="6" fill="#F3F4F6" stroke="#E4E4E7" stroke-width="1"/>
  <text x="451" y="37" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#71717A" text-anchor="middle">+ Column</text>

  <!-- Column 1 – solid -->
  <rect x="20" y="62" width="148" height="278" rx="8" fill="white" stroke="#E4E4E7" stroke-width="1"/>
  <rect x="28" y="70" width="100" height="7" rx="2" fill="#0F0F10"/>
  <rect x="28" y="94" width="132" height="54" rx="6" fill="#F3F4F6" stroke="#E4E4E7" stroke-width="1"/>
  <rect x="36" y="104" width="80" height="6" rx="2" fill="#D4D4D8"/>
  <rect x="36" y="114" width="55" height="6" rx="2" fill="#D4D4D8"/>
  <rect x="28" y="156" width="132" height="54" rx="6" fill="#F3F4F6" stroke="#E4E4E7" stroke-width="1"/>
  <rect x="36" y="166" width="90" height="6" rx="2" fill="#D4D4D8"/>
  <rect x="36" y="176" width="62" height="6" rx="2" fill="#D4D4D8"/>
  <rect x="28" y="218" width="132" height="54" rx="6" fill="#F3F4F6" stroke="#E4E4E7" stroke-width="1"/>
  <rect x="36" y="228" width="70" height="6" rx="2" fill="#D4D4D8"/>
  <rect x="36" y="238" width="48" height="6" rx="2" fill="#D4D4D8"/>

  <!-- Column 2 – dashed (customizable) -->
  <rect x="181" y="62" width="148" height="278" rx="8" fill="none" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="255" y="88" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#A1A1AA" text-anchor="middle">Name it anything</text>
  <rect x="189" y="100" width="132" height="50" rx="6" fill="none" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="189" y="162" width="132" height="50" rx="6" fill="none" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="189" y="224" width="132" height="50" rx="6" fill="none" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Column 3 – add column placeholder -->
  <rect x="342" y="62" width="148" height="278" rx="8" fill="none" stroke="#E4E4E7" stroke-width="1.5" stroke-dasharray="6 4"/>
  <circle cx="416" cy="200" r="24" fill="#EEF0FF"/>
  <text x="416" y="208" font-family="system-ui,sans-serif" font-size="22" fill="#5B47E0" text-anchor="middle">+</text>
  <text x="416" y="234" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#A1A1AA" text-anchor="middle">Add column</text>
</svg>