spring:
    application:
        name: auth-service
    liquibase:
        change-log: classpath:/db/changelog/db.changelog-master.xml

server:
    port: 8081

jwt:
    secret: ${JWT_SECRET:PKr8VmsFMreD//KrCWf+kINmoKwKaSoptbNJ7D+H/eU=}
    access-token-expiration: 900000       # 15 minutes
    refresh-token-expiration: 604800000   # 7 days

auth:
    pepper: ${AUTH_PEPPER:bento-dev-pepper-change-in-production}




---
spring:
    config:
        activate:
            on-profile: dev
    datasource:
        url: jdbc:postgresql://localhost:5433/authdb
        username: root
        password: root
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true
---
spring:
    config:
        activate:
            on-profile: docker
    datasource:
        url: jdbc:postgresql://postgres:5432/authdb
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD:admin}
    jpa:
        hibernate:
            ddl-auto: validate
---
spring:
    config:
        activate:
            on-profile: selfhost
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: validate