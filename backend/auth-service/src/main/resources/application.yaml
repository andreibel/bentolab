spring:
    application:
        name: auth-service
    liquibase:
        change-log: classpath:/db/changelog/db.changelog-master.xml

server:
    port: 8081

jwt:
    secret: ${JWT_SECRET:bento-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
    access-token-expiration: 900000       # 15 minutes
    refresh-token-expiration: 604800000   # 7 days




---
spring:
    config:
        activate:
            on-profile: dev
    datasource:
        url: jdbc:postgresql://localhost:5433/auth-db
        username: root
        password: root
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true
---
spring:
    config:
        activate:
            on-profile: docker
    datasource:
        url: jdbc:postgresql://postgres:5432/auth-db
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD:admin}
    jpa:
        hibernate:
            ddl-auto: validate
---
spring:
    config:
        activate:
            on-profile: selfhost
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth-db}
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: validate