spring:
    application:
        name: board-service
    liquibase:
        change-log: classpath:/db/changelog/db.changelog-master.xml

server:
    port: 8083

internal:
    # Shared secret between the API gateway and all microservices.
    # The gateway adds X-Internal-Secret header with this value on every forwarded request.
    # Services reject requests where this header is missing or wrong (direct access bypass attempt).
    # MUST match the value configured in the api-gateway. Change in production via env var.
    gateway-secret: ${GATEWAY_INTERNAL_SECRET:dktxrevDkto3aZUvUD6REkn+x2x0foPhAvXBueFO4rs=}

---
spring:
    config:
        activate:
            on-profile: dev
    datasource:
        url: jdbc:postgresql://localhost:5435/boarddb
        username: root
        password: root
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true
    data:
        redis:
            host: localhost
            port: 6380
    kafka:
        bootstrap-servers: localhost:9092
        consumer:
            group-id: board-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

---
spring:
    config:
        activate:
            on-profile: docker
    datasource:
        url: jdbc:postgresql://postgres-board:5432/boarddb
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD:admin}
    jpa:
        hibernate:
            ddl-auto: validate
    data:
        redis:
            host: redis
            port: 6379
    kafka:
        bootstrap-servers: kafka:29092
        consumer:
            group-id: board-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

---
spring:
    config:
        activate:
            on-profile: selfhost
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:boarddb}
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: validate
    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
    kafka:
        bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
        consumer:
            group-id: board-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer