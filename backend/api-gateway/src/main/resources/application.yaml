spring:
    application:
        name: api-gateway

server:
    port: 8080

jwt:
    secret: ${JWT_SECRET:PKr8VmsFMreD//KrCWf+kINmoKwKaSoptbNJ7D+H/eU=}

internal:
    # Shared secret added to every forwarded request as X-Internal-Secret header.
    # Microservices reject requests where this header is missing or wrong.
    # MUST match the value configured in all microservices. Change in production via env var.
    gateway-secret: ${GATEWAY_INTERNAL_SECRET:dktxrevDkto3aZUvUD6REkn+x2x0foPhAvXBueFO4rs=}

# Paths that do not require a valid JWT — forwarded without X-User-* headers
# Supports Ant-style patterns: * matches one segment, ** matches multiple
gateway:
    public-paths:
        - /api/auth/register
        - /api/auth/login
        - /api/auth/refresh
        - /api/auth/forgot-password
        - /api/auth/reset-password
        - /api/auth/verify-email
        - /api/auth/resend-verification
        - /api/auth/switch-org-by-slug
        - /api/invitations/*/preview

---
spring:
    config:
        activate:
            on-profile: dev
    data:
        redis:
            host: localhost
            port: 6380
    kafka:
        bootstrap-servers: localhost:9092
        consumer:
            group-id: api-gateway
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    cloud:
        gateway:
            server:
                webflux:
                    routes:
                        - id: auth-service
                          uri: http://localhost:8081
                          predicates:
                              - Path=/api/auth/**, /api/users/**

                        - id: org-service
                          uri: http://localhost:8082
                          predicates:
                              - Path=/api/orgs, /api/orgs/**, /api/members/**, /api/invitations/**

                        - id: board-service
                          uri: http://localhost:8083
                          predicates:
                              - Path=/api/boards, /api/boards/**, /api/labels, /api/labels/**

                        - id: task-service
                          uri: http://localhost:8084
                          predicates:
                              - Path=/api/issues, /api/issues/**, /api/sprints, /api/sprints/**, /api/epics, /api/epics/**, /api/milestones, /api/milestones/**

                        - id: notification-service
                          uri: http://localhost:8085
                          predicates:
                              - Path=/api/notifications, /api/notifications/**

                        - id: realtime-service
                          uri: http://localhost:8086
                          predicates:
                              - Path=/ws, /ws/**

                        - id: attacment-service
                          uri: http://localhost:8087
                          predicates:
                              - Path=/api/attachments, /api/attachments/**

