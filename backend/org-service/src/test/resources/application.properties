# H2 in PostgreSQL mode so jsonb column definitions are accepted
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.liquibase.enabled=false
spring.jpa.properties.hibernate.type.json_format_mapper=io.bento.orgservice.config.JacksonFormatMapper
# Shared gateway secret for controller tests
internal.gateway-secret=test-secret