spring:
    application:
        name: org-service
    liquibase:
        change-log: classpath:/db/changelog/db.changelog-master.xml
server:
    port: 8082

---
spring:
    config:
        activate:
            on-profile: dev
    datasource:
        url: jdbc:postgresql://localhost:5434/orgdb
        username: root
        password: root
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true
    data:
        redis:
            host: localhost
            port: 6380
    kafka:
        bootstrap-servers: localhost:9093
        consumer:
            group-id: org-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

---
spring:
    config:
        activate:
            on-profile: docker
    datasource:
        url: jdbc:postgresql://postgres-org:5432/orgdb
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD:admin}
    jpa:
        hibernate:
            ddl-auto: validate
    data:
        redis:
            host: redis
            port: 6379
    kafka:
        bootstrap-servers: kafka:9092
        consumer:
            group-id: org-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

---
spring:
    config:
        activate:
            on-profile: selfhost
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orgdb}
        username: ${DB_USERNAME:admin}
        password: ${DB_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: validate
    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
    kafka:
        bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
        consumer:
            group-id: org-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer