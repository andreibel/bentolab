services:

  # ── Auth Service ────────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:17
    restart: "no"
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: authdb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── Org Service ─────────────────────────────────────────────────────────────
  postgres-org:
    image: postgres:17
    restart: "no"
    ports:
      - "5434:5432"
    volumes:
      - postgres_org_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: orgdb
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── Shared ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: "no"
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_auth_data:
  postgres_org_data:
  redis_data: