spring:
    application:
        name: notification-service

server:
    port: 8085

internal:
    gateway-secret: ${GATEWAY_INTERNAL_SECRET:dktxrevDkto3aZUvUD6REkn+x2x0foPhAvXBueFO4rs=}

notification:
    mail:
        from: ${MAIL_FROM:noreply@bentolab.app}
        from-name: Bento
        frontend-url: ${FRONTEND_URL:http://localhost:5173}
    discord:
        enabled: ${DISCORD_ENABLED:false}

---
spring:
    config:
        activate:
            on-profile: dev
    mongodb:
        host: localhost
        port: 27017
        database: notification_db
        username: root
        password: root
        authentication-database: admin
    data:
        redis:
            host: localhost
            port: 6380
    kafka:
        bootstrap-servers: localhost:9092
        consumer:
            group-id: notification-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    mail:
        host: localhost
        port: 1025
        properties:
            mail:
                smtp:
                    auth: false
                    starttls:
                        enable: false

---
spring:
    config:
        activate:
            on-profile: docker
    mongodb:
        host: mongo
        port: 27017
        database: notification_db
        username: root
        password: root
        authentication-database: admin
    data:
        redis:
            host: redis
            port: 6379
    kafka:
        bootstrap-servers: kafka:29092
        consumer:
            group-id: notification-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    mail:
        host: mailhog
        port: 1025
        properties:
            mail:
                smtp:
                    auth: false
                    starttls:
                        enable: false

---
spring:
    config:
        activate:
            on-profile: selfhost
    mongodb:
        host: ${MONGO_HOST:localhost}
        port: ${MONGO_PORT:27017}
        database: ${MONGO_DB:notification_db}
        username: ${MONGO_USERNAME}
        password: ${MONGO_PASSWORD}
        authentication-database: admin
    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
    kafka:
        bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
        consumer:
            group-id: notification-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    mail:
        host: ${MAIL_HOST}
        port: ${MAIL_PORT:587}
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
